<html>
    <head>
        <title>Settings Manager Mobile</title>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <!--
		-->
		<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
		<meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, height=device-height, user-scalable=0">
		<style type="text/css" media="screen">
            html, body              { height:100%;             background-color: #333333;}
            body                        { margin:0;                    padding:0;               overflow:hidden; }
            #flashContent       { width:100%;                height:100%; }
		</style>
    </head>
    <body>
        <div id="flashContent">
			<object classid="clsid:d27cdb6e-ae6d-11cf-96b8-444553540000" width="100%" height="100%" id="smMobile" align="middle">
				<param name="movie" value="smMobile.swf">
				<param name="bgcolor" value="#CCCCCC">
				<param name="FlashVars" value="pAlign=TL">
				<param name="scale" value="noScale">
				<!--[if !IE]>-->
				<object type="application/x-shockwave-flash" data="/flashplayer/mobile/smMobile.swf" width="100%" height="100%"><param name="movie" value="smMobile.swf"><param name="bgcolor" value="#CCCCCC"><param name="FlashVars" value="pAlign=TL"><param name="scale" value="noScale"></object>
				<!--<![endif]-->
			</object>
		</div>
		<script type="text/javascript">
			if (top!=self){
				top.location.href=self.location.href;
			}
		</script>
    </body>
</html>
